name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $attempt), retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Check Lint & Formatting (Biome)
        run: npm run lint
        
      - name: Check Types (TypeScript)
        run: npm run typecheck
        
      - name: Run Tests
        run: npm test
