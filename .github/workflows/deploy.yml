name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Sudokupado
        run: npm run build --workspace=@pwarush/sudokupado

      - name: Build Murdokupado
        run: npm run build --workspace=@pwarush/murdokupado

      - name: Build Neon Quiz
        run: npm run build --workspace=@pwarush/neonquiz

      - name: Build El Farsante
        run: npm run build --workspace=@pwarush/elfarsante
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/sudokupado deploy/murdokupado deploy/elfarsante deploy/neonquiz
          cp landing/index.html deploy/index.html
          cp landing/styles.css deploy/styles.css
          cp -r apps/sudokupado/dist/. deploy/sudokupado/
          cp -r apps/murdokupado/dist/. deploy/murdokupado/
          cp -r apps/elfarsante/dist/. deploy/elfarsante/
          cp -r apps/neonquiz/dist/. deploy/neonquiz/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
