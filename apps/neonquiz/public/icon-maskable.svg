<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable Neon Quiz mark: full-bleed deep-space backdrop with the category hexagon and
       Nexus spark kept inside the central safe zone (flat-top, R=175, centre 256,256). -->
  <defs>
    <radialGradient id="nq-bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#161628"/>
      <stop offset="55%" stop-color="#0c0c16"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>
    <radialGradient id="nq-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#9cf6ff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </radialGradient>
    <filter id="nq-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#nq-bg)"/>

  <g fill="none" stroke-width="17" stroke-linecap="round" filter="url(#nq-glow)">
    <line x1="431" y1="256" x2="343.5" y2="407.6" stroke="#00ffff"/>
    <line x1="343.5" y1="407.6" x2="168.5" y2="407.6" stroke="#00ff66"/>
    <line x1="168.5" y1="407.6" x2="81" y2="256" stroke="#ffcc00"/>
    <line x1="81" y1="256" x2="168.5" y2="104.4" stroke="#ff6600"/>
    <line x1="168.5" y1="104.4" x2="343.5" y2="104.4" stroke="#ff0055"/>
    <line x1="343.5" y1="104.4" x2="431" y2="256" stroke="#9900ff"/>
  </g>

  <circle cx="256" cy="256" r="50" fill="#00f0ff" opacity="0.35" filter="url(#nq-glow)"/>
  <polygon
    points="256,170 275.1,236.9 342,256 275.1,275.1 256,342 236.9,275.1 170,256 236.9,236.9"
    fill="url(#nq-core)" filter="url(#nq-glow)"/>
</svg>
