<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Neon Quiz app mark: a flat-top hexagon (the board tile) whose six edges carry the
       six trivia category neon colours, with the Nexus spark glowing at its core, set on
       a deep-space backdrop. -->
  <defs>
    <radialGradient id="nq-bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#161628"/>
      <stop offset="55%" stop-color="#0c0c16"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>
    <radialGradient id="nq-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#9cf6ff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </radialGradient>
    <filter id="nq-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#nq-bg)"/>

  <!-- Six category-coloured hexagon edges (flat-top, R=152, centre 256,256). -->
  <g fill="none" stroke-width="15" stroke-linecap="round" filter="url(#nq-glow)">
    <line x1="408" y1="256" x2="332" y2="387.6" stroke="#00ffff"/>
    <line x1="332" y1="387.6" x2="180" y2="387.6" stroke="#00ff66"/>
    <line x1="180" y1="387.6" x2="104" y2="256" stroke="#ffcc00"/>
    <line x1="104" y1="256" x2="180" y2="124.4" stroke="#ff6600"/>
    <line x1="180" y1="124.4" x2="332" y2="124.4" stroke="#ff0055"/>
    <line x1="332" y1="124.4" x2="408" y2="256" stroke="#9900ff"/>
  </g>

  <!-- Nexus spark: a four-pointed star over a cyan core. -->
  <circle cx="256" cy="256" r="44" fill="#00f0ff" opacity="0.35" filter="url(#nq-glow)"/>
  <polygon
    points="256,182 272.6,239.4 330,256 272.6,272.6 256,330 239.4,272.6 182,256 239.4,239.4"
    fill="url(#nq-core)" filter="url(#nq-glow)"/>
</svg>
